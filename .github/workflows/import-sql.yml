name: Import SQL to MongoDB

on:
  push:
    branches: [ main ]
    paths:
      - 'quizbee (1).sql'
      - 'scripts/**'
  workflow_dispatch: {}

jobs:
  import-sql:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Ensure MONGODB_URI is set
        run: |
          if [ -z "$MONGODB_URI" ]; then echo "Missing MONGODB_URI secret"; exit 1; fi

      - name: Install dependencies (or mongodb if none)
        run: |
          if [ -f package.json ]; then npm ci --prefer-offline --no-audit --progress=false; else npm install mongodb --no-audit --no-progress; fi

      - name: Run fix script (produce quizbee-fixed.sql)
        run: node --experimental-modules scripts/fix-sql-insert.mjs "quizbee (1).sql" "quizbee-fixed.sql"

      - name: Run import script
        run: node --experimental-modules scripts/import-sql-to-mongodb.mjs "quizbee-fixed.sql"
